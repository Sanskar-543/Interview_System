name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (Shared)
        run: npm install
        working-directory: packages/shared

      - name: Install dependencies (Gateway)
        run: npm install
        working-directory: apps/gateway

      - name: Install dependencies (Voice Service)
        run: npm install
        working-directory: apps/voice-service

      - name: Run Typecheck (Shared)
        run: npx tsc --noEmit --project tsconfig.json
        working-directory: packages/shared

      - name: Run Typecheck (Gateway)
        run: npx tsc --noEmit --project tsconfig.json
        working-directory: apps/gateway

      - name: Run Typecheck (Voice Service)
        run: npx tsc --noEmit --project tsconfig.json
        working-directory: apps/voice-service

      - name: Run Unit Tests
        run: node --test tests/unit/*.test.ts
