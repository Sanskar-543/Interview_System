name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Typecheck (Shared)
        run: pnpm tsc --noEmit --project tsconfig.json
        working-directory: packages/shared

      - name: Run Typecheck (Gateway)
        run: pnpm tsc --noEmit --project tsconfig.json
        working-directory: apps/gateway

      - name: Run Typecheck (Voice Service)
        run: pnpm tsc --noEmit --project tsconfig.json
        working-directory: apps/voice-service

      - name: Run Unit Tests
        run: pnpm exec tsx --test tests/unit/**/*.test.ts
