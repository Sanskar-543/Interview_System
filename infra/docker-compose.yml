version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: ai_interviewer_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: always

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_interviewer_postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ai_interviewer
      POSTGRES_PASSWORD: ai_interviewer_dev
      POSTGRES_DB: ai_interviewer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  redis_data:
  postgres_data:
