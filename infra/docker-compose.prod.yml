version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: ai_interviewer_redis_prod
    ports:
      - '6379:6379'
    volumes:
      - redis_prod_data:/data
    restart: always

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_interviewer_postgres_prod
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ai_interviewer
      POSTGRES_PASSWORD: ai_interviewer_dev
      POSTGRES_DB: ai_interviewer
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: always

  gateway:
    build:
      context: ..
      dockerfile: apps/gateway/Dockerfile
    container_name: ai_interviewer_gateway_prod
    ports:
      - '5000:5000'
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://ai_interviewer:ai_interviewer_dev@postgres:5432/ai_interviewer
    depends_on:
      - redis
      - postgres
    restart: always

  voice-service:
    build:
      context: ..
      dockerfile: apps/voice-service/Dockerfile
    container_name: ai_interviewer_voice_prod
    ports:
      - '3001:3001'
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://ai_interviewer:ai_interviewer_dev@postgres:5432/ai_interviewer
    depends_on:
      - redis
      - postgres
    restart: always

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    container_name: ai_interviewer_worker_prod
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://ai_interviewer:ai_interviewer_dev@postgres:5432/ai_interviewer
    depends_on:
      - redis
      - postgres
    restart: always

volumes:
  redis_prod_data:
  postgres_prod_data:
